name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linux_tests:
    runs-on: ubuntu-24.04

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      fail-fast: true
      matrix:
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }} - Linux

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      DATABASE_PATH: /db
      DATABASE_SCHEME: mysql
      DATABASE_QUERY: serverVersion=8
      DATABASE_USER: user
      DATABASE_PASS: password

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: error_reporting=E_ALL
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: '--prefer-stable'

      - name: Execute tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: vendor/bin/phpunit --no-coverage

  update_badge:
    needs: linux_tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    name: Update coverage badge
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      DATABASE_PATH: /db
      DATABASE_SCHEME: mysql
      DATABASE_QUERY: serverVersion=8
      DATABASE_USER: user
      DATABASE_PASS: password

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          ini-values: error_reporting=E_ALL
          coverage: xdebug

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: '--prefer-stable'

      - name: Execute tests with coverage
        run: vendor/bin/phpunit

      - name: Generate coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.1
        with:
          coverage_badge_path: 'badge-coverage.svg'
          push_badge: false

      - name: Push badge to badge branch
        run: |
          cp badge-coverage.svg /tmp/badge-coverage.svg
          rm badge-coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badge || true
          if git rev-parse --verify origin/badge >/dev/null 2>&1; then
            git checkout badge
          else
            git checkout --orphan badge
            git rm -rf .
          fi
          cp /tmp/badge-coverage.svg badge-coverage.svg
          git add badge-coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge"
          git push origin badge
